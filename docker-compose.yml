services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinic_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Mentalist1986}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - clinic_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinic_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./clinic-api
      dockerfile: Dockerfile
    container_name: clinic_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clinic_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-Mentalist1986}
      APP_JWT_SECRET: ${JWT_SECRET:-cliqueSecretKey2024SuperLongKeyForHMACAlgorithm256Bits!!}
      APP_JWT_EXPIRATION: 86400000
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8081:8081"
    networks:
      - clinic_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  frontend:
    build:
      context: ./clinic-frontend
      dockerfile: Dockerfile
    container_name: clinic_frontend
    restart: unless-stopped
    depends_on:
      - backend # ← retire condition service_healthy
    ports:
      - "80:80"
    networks:
      - clinic_network

networks:
  clinic_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
