<div class="fixed bottom-4 right-4 z-50 space-y-3 w-80">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      [@slideInBottom]
      class="flex items-start gap-3 p-4 rounded-2xl shadow-lg border border-gray-100"
      [class]="getClasses(toast.type)"
    >
      <lucide-icon
        [img]="getIcon(toast.type)"
        size="20"
        [color]="getIconColor(toast.type)"
        class="shrink-0 mt-0.5"
      >
      </lucide-icon>
      <p class="flex-1 text-sm text-gray-700 font-medium">
        {{ toast.message }}
      </p>
      <button
        (click)="toastService.remove(toast.id)"
        class="text-gray-300 hover:text-gray-500 shrink-0 transition-colors"
      >
        <lucide-icon [img]="X" size="14"></lucide-icon>
      </button>
    </div>
  }
</div>
