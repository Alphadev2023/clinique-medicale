<div
  class="min-h-screen bg-gradient-to-br from-red-50 to-orange-100 flex items-center justify-center p-4"
>
  <div class="text-center max-w-lg animate-fade-in">
    <!-- Illustration -->
    <div class="relative mb-8">
      <div class="text-9xl font-black text-red-200 select-none leading-none">
        500
      </div>
      <div class="absolute inset-0 flex items-center justify-center">
        <div
          class="w-24 h-24 bg-white rounded-3xl shadow-xl flex items-center justify-center"
        >
          <lucide-icon
            [img]="AlertTriangle"
            size="40"
            color="#ef4444"
          ></lucide-icon>
        </div>
      </div>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-3">Erreur serveur</h1>
    <p class="text-gray-500 mb-8 leading-relaxed">
      Une erreur inattendue s'est produite. Notre équipe technique a été
      notifiée. Veuillez réessayer dans quelques instants.
    </p>

    <div class="flex items-center justify-center gap-4">
      <button
        (click)="reload()"
        class="btn-primary flex items-center gap-2 px-6 py-3"
      >
        <lucide-icon [img]="RefreshCw" size="18"></lucide-icon>
        Réessayer
      </button>
      <a
        routerLink="/dashboard"
        class="btn-secondary flex items-center gap-2 px-6 py-3"
      >
        <lucide-icon [img]="Home" size="18"></lucide-icon>
        Accueil
      </a>
    </div>

    <div class="mt-12 flex items-center justify-center gap-2 text-gray-400">
      <div
        class="w-6 h-6 bg-blue-600 rounded-lg flex items-center justify-center"
      >
        <span class="text-white text-xs font-bold">C</span>
      </div>
      <span class="text-sm">Clinique Médicale</span>
    </div>
  </div>
</div>
