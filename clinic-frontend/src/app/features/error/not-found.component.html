<div
  class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4"
>
  <div class="text-center max-w-lg animate-fade-in">
    <!-- Illustration -->
    <div class="relative mb-8">
      <div class="text-9xl font-black text-blue-200 select-none leading-none">
        404
      </div>
      <div class="absolute inset-0 flex items-center justify-center">
        <div
          class="w-24 h-24 bg-white rounded-3xl shadow-xl flex items-center justify-center"
        >
          <lucide-icon [img]="Search" size="40" color="#3b82f6"></lucide-icon>
        </div>
      </div>
    </div>

    <!-- Texte -->
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Page introuvable</h1>
    <p class="text-gray-500 mb-8 leading-relaxed">
      La page que vous recherchez n'existe pas ou a été déplacée. Vérifiez l'URL
      ou retournez à l'accueil.
    </p>

    <!-- Actions -->
    <div class="flex items-center justify-center gap-4">
      <a
        routerLink="/dashboard"
        class="btn-primary flex items-center gap-2 px-6 py-3"
      >
        <lucide-icon [img]="Home" size="18"></lucide-icon>
        Retour à l'accueil
      </a>
      <button
        onclick="history.back()"
        class="btn-secondary flex items-center gap-2 px-6 py-3"
      >
        <lucide-icon [img]="ArrowLeft" size="18"></lucide-icon>
        Page précédente
      </button>
    </div>

    <!-- Info clinique -->
    <div class="mt-12 flex items-center justify-center gap-2 text-gray-400">
      <div
        class="w-6 h-6 bg-blue-600 rounded-lg flex items-center justify-center"
      >
        <span class="text-white text-xs font-bold">C</span>
      </div>
      <span class="text-sm">Clinique Médicale</span>
    </div>
  </div>
</div>
