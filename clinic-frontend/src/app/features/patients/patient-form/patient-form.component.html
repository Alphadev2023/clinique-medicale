<!-- Overlay -->
<div
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"
>
  <div
    class="bg-white rounded-2xl shadow-xl w-full max-w-2xl flex flex-col"
    style="max-height: 90vh"
  >
    <!-- Header sticky -->
    <div
      class="flex items-center justify-between p-6 border-b border-gray-100 shrink-0"
    >
      <h2 class="text-lg font-semibold text-gray-900">
        {{ patient ? "Modifier le patient" : "Nouveau patient" }}
      </h2>
      <button
        (click)="cancelled.emit()"
        class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-xl transition-colors"
      >
        <lucide-icon [img]="X" size="20"></lucide-icon>
      </button>
    </div>

    <div class="overflow-y-auto flex-1">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-6 space-y-6">
        @if (error()) {
          <div
            class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm flex items-center gap-2"
          >
            <lucide-icon [img]="AlertCircle" size="16"></lucide-icon>
            {{ error() }}
          </div>
        }

        <!-- Infos de base -->
        <div>
          <h3
            class="text-xs font-semibold text-gray-500 mb-4 uppercase tracking-wider"
          >
            Informations personnelles
          </h3>
          <div class="grid grid-cols-2 gap-4">
            <app-form-field
              label="Prénom"
              [control]="form.get('prenom')"
              [required]="true"
            >
              <input
                type="text"
                formControlName="prenom"
                placeholder="Ibrahima Bobo"
                class="input-field"
                [class.border-red-300]="
                  form.get('prenom')?.invalid && form.get('prenom')?.touched
                "
                [class.border-green-300]="
                  form.get('prenom')?.valid && form.get('prenom')?.touched
                "
                [class.pr-9]="form.get('prenom')?.touched"
              />
            </app-form-field>

            <app-form-field
              label="Nom"
              [control]="form.get('nom')"
              [required]="true"
            >
              <input
                type="text"
                formControlName="nom"
                placeholder="Diallo"
                class="input-field"
                [class.border-red-300]="
                  form.get('nom')?.invalid && form.get('nom')?.touched
                "
                [class.border-green-300]="
                  form.get('nom')?.valid && form.get('nom')?.touched
                "
                [class.pr-9]="form.get('nom')?.touched"
              />
            </app-form-field>

            <app-form-field
              label="Email"
              [control]="form.get('email')"
              [required]="true"
            >
              <input
                type="email"
                formControlName="email"
                placeholder="ibrahimabobo&#64;email.com"
                class="input-field"
                [class.border-red-300]="
                  form.get('email')?.invalid && form.get('email')?.touched
                "
                [class.border-green-300]="
                  form.get('email')?.valid && form.get('email')?.touched
                "
                [class.pr-9]="form.get('email')?.touched"
              />
            </app-form-field>

            <app-form-field
              label="Téléphone"
              [control]="form.get('telephone')"
              hint="Format : 621XXXXXXXX"
            >
              <input
                type="text"
                formControlName="telephone"
                placeholder="621234567"
                class="input-field"
              />
            </app-form-field>

            <app-form-field
              label="Date de naissance"
              [control]="form.get('dateNaissance')"
              [required]="true"
            >
              <input
                type="date"
                formControlName="dateNaissance"
                class="input-field"
                [class.border-red-300]="
                  form.get('dateNaissance')?.invalid &&
                  form.get('dateNaissance')?.touched
                "
                [class.border-green-300]="
                  form.get('dateNaissance')?.valid &&
                  form.get('dateNaissance')?.touched
                "
              />
            </app-form-field>

            <app-form-field label="Genre" [control]="form.get('genre')">
              <select formControlName="genre" class="input-field">
                <option value="MASCULIN">Masculin</option>
                <option value="FEMININ">Féminin</option>
                <option value="AUTRE">Autre</option>
              </select>
            </app-form-field>

            <app-form-field
              label="Adresse"
              [control]="form.get('adresse')"
              class="col-span-2"
            >
              <input
                type="text"
                formControlName="adresse"
                placeholder="Coyah, Gomnyah clinique"
                class="input-field col-span-2"
              />
            </app-form-field>

            <app-form-field
              label="N° Sécurité sociale"
              [control]="form.get('numeroSecuriteSociale')"
              class="col-span-2"
              hint="15 chiffres"
            >
              <input
                type="text"
                formControlName="numeroSecuriteSociale"
                class="input-field col-span-2"
              />
            </app-form-field>
          </div>
        </div>

        <!-- Historique médical -->
        <div formGroupName="historiqueMedical">
          <h3
            class="text-xs font-semibold text-gray-500 mb-4 uppercase tracking-wider"
          >
            Historique médical
          </h3>
          <div class="space-y-3">
            <app-form-field
              label="Antécédents"
              [control]="form.get('historiqueMedical.antecedents')"
            >
              <textarea
                formControlName="antecedents"
                class="input-field"
                rows="2"
                placeholder="Hypertension, diabète..."
              ></textarea>
            </app-form-field>
            <app-form-field
              label="Maladies chroniques"
              [control]="form.get('historiqueMedical.maladiesChroniques')"
            >
              <textarea
                formControlName="maladiesChroniques"
                class="input-field"
                rows="2"
              ></textarea>
            </app-form-field>
            <app-form-field
              label="Chirurgies"
              [control]="form.get('historiqueMedical.chirurgies')"
            >
              <textarea
                formControlName="chirurgies"
                class="input-field"
                rows="2"
              ></textarea>
            </app-form-field>
            <app-form-field
              label="Traitements en cours"
              [control]="form.get('historiqueMedical.traitementsEnCours')"
            >
              <textarea
                formControlName="traitementsEnCours"
                class="input-field"
                rows="2"
              ></textarea>
            </app-form-field>
          </div>
        </div>

        <!-- Allergies -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <h3
              class="text-xs font-semibold text-gray-500 uppercase tracking-wider"
            >
              Allergies
            </h3>
            <button
              type="button"
              (click)="addAllergy()"
              class="btn-secondary flex items-center gap-1 text-xs py-1.5"
            >
              <lucide-icon [img]="Plus" size="14"></lucide-icon>
              Ajouter
            </button>
          </div>
          <div formArrayName="allergies" class="space-y-3">
            @for (allergy of allergiesArray.controls; track $index) {
              <div
                [formGroupName]="$index"
                class="bg-gray-50 rounded-xl p-4 grid grid-cols-3 gap-3 border border-gray-100"
              >
                <app-form-field
                  label="Substance"
                  [control]="allergiesArray.at($index).get('nom')"
                >
                  <input
                    type="text"
                    formControlName="nom"
                    class="input-field text-sm"
                    placeholder="Pénicilline"
                  />
                </app-form-field>
                <app-form-field
                  label="Sévérité"
                  [control]="allergiesArray.at($index).get('severite')"
                >
                  <select
                    formControlName="severite"
                    class="input-field text-sm"
                  >
                    <option value="LÉGÈRE">Légère</option>
                    <option value="MODÉRÉE">Modérée</option>
                    <option value="SÉVÈRE">Sévère</option>
                  </select>
                </app-form-field>
                <div class="flex items-end gap-2">
                  <app-form-field
                    label="Réaction"
                    [control]="allergiesArray.at($index).get('reaction')"
                    class="flex-1"
                  >
                    <input
                      type="text"
                      formControlName="reaction"
                      class="input-field text-sm"
                      placeholder="Urticaire..."
                    />
                  </app-form-field>
                  <button
                    type="button"
                    (click)="removeAllergy($index)"
                    class="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg mb-0.5 transition-colors"
                  >
                    <lucide-icon [img]="Trash2" size="16"></lucide-icon>
                  </button>
                </div>
              </div>
            }
          </div>
        </div>

        <!-- Footer -->
        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
          <button
            type="button"
            (click)="cancelled.emit()"
            class="btn-secondary"
          >
            Annuler
          </button>
          <button
            type="submit"
            [disabled]="form.invalid || loading()"
            class="btn-primary flex items-center gap-2"
          >
            @if (loading()) {
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                />
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                />
              </svg>
            } @else {
              <lucide-icon [img]="Save" size="16"></lucide-icon>
            }
            {{ patient ? "Modifier" : "Créer le patient" }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
