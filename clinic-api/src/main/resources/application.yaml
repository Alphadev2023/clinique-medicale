upload:
  dir: uploads

spring:
  application:
    name: clinic-api
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

  datasource:
    url: jdbc:postgresql://localhost:5432/clinic_db
    username: postgres
    password: Mentalist1986
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:cliqueSecretKey2024SuperLongKeyForHMACAlgorithm256Bits!!}
    expiration: 86400000    # 24h en ms

springdoc:
  swagger-ui:
    path: /swagger-ui.html